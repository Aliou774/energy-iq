<nav class="sidebar" [class.collapsed]="collapsed">

  <!-- Brand -->
  <div class="sidebar-brand" (click)="toggleCollapse()">
    <div class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
        <rect x="3"  y="3"  width="19" height="19" rx="4"
              fill="#F2EFEA"/>
        <rect x="26" y="3"  width="19" height="19" rx="4"
              fill="#F2EFEA" opacity="0.6"/>
        <rect x="3"  y="26" width="19" height="19" rx="4"
              fill="#9FB7B6" opacity="0.7"/>
        <rect x="26" y="26" width="19" height="19" rx="4"
              fill="#9FB7B6" opacity="0.4"/>
      </svg>
    </div>
    <span class="brand-name" *ngIf="!collapsed">EnergyIQ</span>
    <button class="collapse-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <polyline *ngIf="!collapsed" points="15 18 9 12 15 6"/>
        <polyline *ngIf="collapsed"  points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- Statut système -->
  <div class="system-status" *ngIf="!collapsed">
    <span class="status-dot"></span>
    <span class="status-text">Système actif</span>
  </div>

  <!-- Navigation -->
  <div class="sidebar-nav">

    <span class="nav-section-label" *ngIf="!collapsed">
      NAVIGATION
    </span>

    <!-- Accueil — icône globe (différente de Salles) -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/accueil')"
            (click)="navigateTo('/accueil')"
            [title]="collapsed ? 'Accueil' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10
                   15.3 15.3 0 01-4 10
                   15.3 15.3 0 01-4-10
                   15.3 15.3 0 014-10z"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Accueil</span>
    </button>

    <!-- Dashboard -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/dashboard')"
            (click)="navigateTo('/dashboard')"
            [title]="collapsed ? 'Dashboard' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Dashboard</span>
    </button>

    <!-- Salles — icône maison -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/salles')"
            (click)="navigateTo('/salles')"
            [title]="collapsed ? 'Salles' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5
                   a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Salles</span>
    </button>

    <!-- Équipements -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/equipements')"
            (click)="navigateTo('/equipements')"
            [title]="collapsed ? 'Équipements' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 010 14.14
                   M4.93 4.93a10 10 0 000 14.14"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Équipements</span>
    </button>

    <!-- Mesures -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/mesures')"
            (click)="navigateTo('/mesures')"
            [title]="collapsed ? 'Mesures' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Mesures</span>
    </button>

    <!-- Prédictions ML -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/predictions')"
            (click)="navigateTo('/predictions')"
            [title]="collapsed ? 'Prédictions ML' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14
                            18.18 21.02 12 17.77 5.82 21.02
                            7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">
        Prédictions ML
      </span>
    </button>

    <!-- Alertes -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/alertes')"
            (click)="navigateTo('/alertes')"
            [title]="collapsed ? 'Alertes' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18
                   s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Alertes</span>
      <span class="badge-count"
            *ngIf="alertesCount > 0 && !collapsed">
        {{ alertesCount }}
      </span>
      <span class="badge-dot"
            *ngIf="alertesCount > 0 && collapsed">
      </span>
    </button>

    <div class="nav-divider"></div>

    <span class="nav-section-label" *ngIf="!collapsed">
      COMPTE
    </span>

    <!-- Profil -->
    <button type="button" class="nav-item"
            [class.active]="isActive('/profil')"
            (click)="navigateTo('/profil')"
            [title]="collapsed ? 'Profil' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8
                   a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">Profil</span>
    </button>

    <!-- Déconnexion -->
    <button type="button" class="nav-item nav-logout"
            (click)="logout()"
            [title]="collapsed ? 'Déconnexion' : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5
                   a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">
        Déconnexion
      </span>
    </button>

  </div>

  <!-- Utilisateur bas de page -->
  <div class="sidebar-user" *ngIf="!collapsed">
    <div class="user-avatar">{{ initiales }}</div>
    <div class="user-info">
      <span class="user-name">{{ nomComplet }}</span>
      <span class="user-role">{{ roleFormate }}</span>
    </div>
  </div>

  <!-- Avatar seul si collapsed -->
  <div class="sidebar-user-mini"
       *ngIf="collapsed"
       [title]="nomComplet">
    <div class="user-avatar">{{ initiales }}</div>
  </div>

</nav>
