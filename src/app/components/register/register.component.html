<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-overlay"></div>
  </div>

  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <rect x="3"  y="3"  width="19" height="19" rx="4" fill="#0F4C5C"/>
          <rect x="26" y="3"  width="19" height="19" rx="4" fill="#0F4C5C" opacity="0.6"/>
          <rect x="3"  y="26" width="19" height="19" rx="4" fill="#0F4C5C" opacity="0.6"/>
          <rect x="26" y="26" width="19" height="19" rx="4" fill="#0F4C5C" opacity="0.3"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-name">EnergyIQ</h1>
        <p class="brand-tagline">Gestion Énergétique Intelligente</p>
      </div>
    </div>

    <div class="auth-divider"></div>

    <h2 class="auth-title">Créer un compte</h2>
    <p class="auth-subtitle">
      Rejoignez la plateforme de supervision intelligente
    </p>

    <form (ngSubmit)="register()" #regForm="ngForm" class="auth-form">

      <div class="form-row">
        <div class="form-field">
          <label>Nom <span class="required">*</span></label>
          <input type="text" name="nom" [(ngModel)]="nom"
                 placeholder="Sane" required/>
        </div>
        <div class="form-field">
          <label>Prénom <span class="required">*</span></label>
          <input type="text" name="prenom" [(ngModel)]="prenom"
                 placeholder="Aliou" required/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Date de naissance <span class="required">*</span></label>
          <input type="date" name="dateNaissance"
                 [(ngModel)]="dateNaissance" required/>
        </div>
        <div class="form-field">
          <label>Rôle <span class="required">*</span></label>
          <div class="select-wrap">
            <select name="role" [(ngModel)]="role">
              <option value="gestionnaire">Gestionnaire</option>
              <option value="admin">Administrateur</option>
              <option value="visiteur">Visiteur</option>
            </select>
            <svg class="select-arrow" width="14" height="14"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-field">
        <label>Adresse email <span class="required">*</span></label>
        <div class="field-input-wrap">
          <svg class="field-icon" width="16" height="16"
               viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2
                     2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" name="email" [(ngModel)]="email"
                 placeholder="aliou.sane@gmail.com" required/>
        </div>
      </div>

      <div class="form-field">
        <label>Mot de passe <span class="required">*</span></label>
        <div class="field-input-wrap">
          <svg class="field-icon" width="16" height="16"
               viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPw ? 'text' : 'password'"
                 name="password" [(ngModel)]="password"
                 placeholder="Minimum 6 caractères"
                 required minlength="6"/>
          <button type="button" class="toggle-visibility"
                  (click)="showPw = !showPw">
            <svg *ngIf="!showPw" width="16" height="16"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPw" width="16" height="16"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7
                       0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8
                       a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Téléphone</label>
          <input type="tel" name="telephone" [(ngModel)]="telephone"
                 placeholder="+221 77 000 00 00"/>
        </div>
        <div class="form-field">
          <label>Adresse</label>
          <input type="text" name="adresse" [(ngModel)]="adresse"
                 placeholder="Dakar, Sénégal"/>
        </div>
      </div>

      <div class="form-error" *ngIf="errorMessage">
        <svg width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Créer mon compte</span>
        <span *ngIf="loading" class="btn-loading">
          <span></span><span></span><span></span>
        </span>
      </button>

    </form>

    <p class="auth-footer">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>

  </div>
</div>
